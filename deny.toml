# cargo-deny configuration for linpodx
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.93

# linpodx本体 のライセンス
[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-common"

[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-runtime"

[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-sandbox"

[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-daemon"

[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-cli"

[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-gui"

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
