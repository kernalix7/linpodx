# cargo-deny configuration for linpodx
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Documented waivers — each entry MUST carry a rationale comment explaining why
# the advisory does not apply to linpodx's deployment model. Re-evaluate at every
# release: drop a waiver as soon as an upstream fix lands in our dep graph.
ignore = [
    # hickory-proto 0.25.2 — NSEC3 closest-encloser proof DoS on cross-zone responses.
    # The DNSSEC validation path is the only attack surface; linpodx never enables
    # the validating-resolver feature. The egress filter (linpodx-runtime::network_filter)
    # only serves outbound queries from sandbox containers and never returns NSEC3
    # records. Fixed upstream in 0.26.1 but that release rewrites NameServerConfig +
    # removes ResolveError — migration deferred to a future minor.
    "RUSTSEC-2026-0118",
    # hickory-proto 0.25.2 — O(n^2) name compression CPU exhaustion during message
    # ENCODING. Our DNS server only encodes responses to queries coming from sandbox
    # containers (loopback / Podman network), not internet-facing traffic. A malicious
    # container can already exhaust its own egress budget; the attacker would need
    # local container compromise first, after which DoS on the resolver is the least
    # interesting capability. Fix requires 0.26.1.
    "RUSTSEC-2026-0119",
    # backoff 0.4.0 — unmaintained, transitive via kube-runtime. Will resolve when
    # kube bumps to ≥0.99 (drops backoff).
    "RUSTSEC-2025-0012",
    # instant 0.1.13 — unmaintained, transitive via parking_lot 0.11 + backoff. Same
    # resolution path as RUSTSEC-2025-0012.
    "RUSTSEC-2024-0384",
    # paste 1.0.15 — unmaintained, transitive via wasmtime + leptos. Both upstreams
    # are tracking replacement; not in linpodx's direct surface.
    "RUSTSEC-2024-0436",
    # rustls-pemfile 2.2.0 — folded into rustls-pki-types upstream. Migration is
    # mechanical; deferred until kube + axum-server bump.
    "RUSTSEC-2025-0134",
    # serial 0.4.0 — unmaintained since 2017, transitive via portable-pty 0.8.1
    # (interactive `linpodx exec -it`). portable-pty upstream is tracking serialport
    # migration; only the PTY proxy path is affected.
    "RUSTSEC-2017-0008",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

# linpodx本体 のライセンス
[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-common"

[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-runtime"

[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-sandbox"

[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-daemon"

[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-cli"

[[licenses.exceptions]]
allow = ["MIT"]
crate = "linpodx-gui"

# jsonpath-rust 0.5.1 ships an MIT LICENSE file but never set `license =` in its
# Cargo.toml. Pin the SPDX expression so cargo-deny does not emit a
# `license-not-encountered` warning for it. Upstream PR pending.
[[licenses.clarify]]
crate = "jsonpath-rust"
expression = "MIT"
license-files = [
    { path = "LICENSE", hash = 0x001c7e6e },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
