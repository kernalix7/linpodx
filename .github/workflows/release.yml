name: Release

on:
  push:
    tags:
      # Public version tags stay clean (`v0.1.0`, `v0.2.0-rc.1`).
      # `REL-*` marker tags create/update GitHub Releases and upload artifacts.
      - "REL-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v0.1.0 or v0.2.0-rc.1)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: validate release ref
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.value }}
      version_tag: ${{ steps.version.outputs.tag }}
      checkout_ref: ${{ steps.version.outputs.checkout_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ref="${{ inputs.tag }}"
          else
            ref="${GITHUB_REF_NAME#REL-}"
          fi
          ref="${ref#REL-}"
          version="${ref#v}"
          tag="v$version"
          if ! git rev-parse --verify --quiet "$tag^{}" >/dev/null; then
            echo "Public version tag $tag does not exist" >&2
            exit 1
          fi
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            marker_commit=$(git rev-parse "${GITHUB_REF_NAME}^{}")
            public_commit=$(git rev-parse "$tag^{}")
            if [ "$marker_commit" != "$public_commit" ]; then
              echo "Release marker ${GITHUB_REF_NAME} does not point at $tag" >&2
              exit 1
            fi
          fi
          git checkout --detach "$tag"
          cargo_version=$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)
          if [ "$version" != "$cargo_version" ]; then
            echo "Tag version ($version) does not match Cargo.toml version ($cargo_version)" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$tag" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-validate

      # Phase 18 — validate job builds the GUI when running `cargo test
      # --all-features`, so the same -dev libs are required here too.
      - name: install GUI + sqlite dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            libegl-dev \
            libgl-dev \
            libsqlite3-dev \
            pkg-config

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D rustdoc::broken-intra-doc-links -D warnings"
        run: cargo doc --workspace --no-deps

  build:
    name: build linux artifacts
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.checkout_ref }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-build

      # Phase 18 — GUI build pulls iced/softbuffer/wgpu which need Wayland, EGL,
      # GL and xkbcommon headers at compile time. SQLite headers come in via the
      # daemon's sqlx-sqlite. Hard-fail if these are missing rather than letting
      # the build silently drop the GUI binary.
      - name: install GUI + sqlite dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            libegl-dev \
            libgl-dev \
            libsqlite3-dev \
            pkg-config

      - name: install packaging tools
        run: |
          cargo install cargo-deb --locked || true
          cargo install cargo-generate-rpm --locked || true

      - name: cargo build --release
        run: cargo build --workspace --release --bins

      - name: cargo deb (linpodx-cli)
        run: cargo deb -p linpodx-cli --no-build --output target/debian/linpodx-cli.deb

      - name: cargo deb (linpodx-daemon)
        run: cargo deb -p linpodx-daemon --no-build --output target/debian/linpodx-daemon.deb

      - name: cargo deb (linpodx-gui)
        run: cargo deb -p linpodx-gui --no-build --output target/debian/linpodx-gui.deb

      - name: cargo deb (linpodx-netfilter-helper)
        run: cargo deb -p linpodx-netfilter --no-build --output target/debian/linpodx-netfilter-helper.deb

      - name: cargo generate-rpm (linpodx-cli)
        run: cargo generate-rpm -p crates/linpodx-cli --output target/generate-rpm/linpodx-cli.rpm

      - name: cargo generate-rpm (linpodx-daemon)
        run: cargo generate-rpm -p crates/linpodx-daemon --output target/generate-rpm/linpodx-daemon.rpm

      - name: cargo generate-rpm (linpodx-gui)
        run: cargo generate-rpm -p crates/linpodx-gui --output target/generate-rpm/linpodx-gui.rpm

      - name: cargo generate-rpm (linpodx-netfilter-helper)
        run: cargo generate-rpm -p crates/linpodx-netfilter --output target/generate-rpm/linpodx-netfilter-helper.rpm

      # Phase 18 — hard-fail tarball staging. The previous `|| tar …` fallback
      # silently shipped tarballs without linpodx-gui; we now require all four
      # binaries to be present (build step would have failed otherwise).
      # The helper tarball is staged separately so privileged-helper users can
      # download just that piece without the full archive.
      - name: stage release tarballs
        run: |
          set -euo pipefail
          mkdir -p dist
          for bin in linpodx linpodx-daemon linpodx-gui linpodx-netfilter-helper; do
            if [ ! -x "target/release/$bin" ]; then
              echo "Required binary missing: target/release/$bin" >&2
              exit 1
            fi
          done
          tar czf "dist/linpodx-${{ needs.validate.outputs.version_tag }}-linux-x86_64.tar.gz" \
            -C target/release linpodx linpodx-daemon linpodx-gui linpodx-netfilter-helper
          tar czf "dist/linpodx-netfilter-helper-${{ needs.validate.outputs.version_tag }}-linux-x86_64.tar.gz" \
            -C target/release linpodx-netfilter-helper

      - name: collect artifacts
        run: |
          mkdir -p artifacts
          cp -v dist/*.tar.gz artifacts/ 2>/dev/null || true
          cp -v target/debian/*.deb artifacts/ 2>/dev/null || true
          cp -v target/generate-rpm/*.rpm artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

  release:
    name: create github release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.checkout_ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

      - name: Extract changelog section
        id: changelog
        run: |
          version="${{ needs.validate.outputs.version }}"
          notes=$(awk -v header="## [$version]" '
            index($0, header) == 1 { flag=1 }
            flag && /^## / && index($0, header) != 1 { exit }
            flag { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$notes" | tr -d '[:space:]')" ]; then
            notes="See CHANGELOG.md for details."
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect prerelease
        id: prerelease
        run: |
          version="${{ needs.validate.outputs.version }}"
          if echo "$version" | grep -q -- '-'; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.version_tag }}
          name: ${{ needs.validate.outputs.version_tag }}
          prerelease: ${{ steps.prerelease.outputs.value }}
          body: ${{ steps.changelog.outputs.notes }}
          overwrite_files: true
          files: |
            artifacts/*
