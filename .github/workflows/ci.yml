name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # linpodx-gui is a Tauri shell that links the system WebKitGTK 4.1 + GTK 3
      # stack; install its dev headers so the whole workspace (including the GUI)
      # builds on hosted runners.
      - name: install WebKitGTK + GTK dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            pkg-config
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.92"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.toolchain }}
      - name: install WebKitGTK + GTK dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            pkg-config
      - name: cargo test (workspace, no ignored)
        run: cargo test --workspace --all-features

  doc:
    name: doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D rustdoc::broken-intra-doc-links -D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install WebKitGTK + GTK dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            pkg-config
      - name: cargo doc
        run: cargo doc --workspace --no-deps

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace --all-features

  nightly:
    name: nightly (allow-failure)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly
      - name: install WebKitGTK + GTK dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            pkg-config
      - name: cargo build (nightly)
        run: cargo build --workspace --all-features
      - name: cargo test (nightly)
        run: cargo test --workspace --all-features

  podman-integration:
    # Phase 18 Stream E — runs the `#[ignore]`-gated e2e suites against a real
    # Podman install. `continue-on-error: true` for now because several
    # scenarios still soft-skip behind placeholder dispatch (Streams B/C/D).
    # Flip to `false` once Phase 18 lands the full surface.
    #
    # Gated so PR builds stay fast: runs on every push to main and on PRs only
    # when the `run-integration` label is applied (the apt + podman install +
    # ignored test sweep is ~3-5 min, too long for every PR roundtrip).
    name: podman integration (ignored e2e)
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-integration')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: podman-integration
      - name: install podman + WebKitGTK dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            podman \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            pkg-config
          podman --version
      - name: cargo test (ignored, single-threaded)
        run: cargo test --workspace -- --ignored --test-threads=1
