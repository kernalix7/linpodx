<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>linpodx — Web UI</title>
<link rel="stylesheet" href="/ui/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10/lib/addon-fit.js"></script>
<script type="module">
  import init, { entry } from "/ui/linpodx_webui.js";
  init("/ui/linpodx_webui.wasm").then(() => entry()).catch((err) => {
    document.body.textContent =
      "linpodx Web UI failed to load WASM bundle: " + (err && err.message ? err.message : err) +
      "\nTry the legacy UI: /ui/?legacy=1";
  });
</script>
</head>
<body></body>
</html>
